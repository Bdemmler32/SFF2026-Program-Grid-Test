<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SFF2026 Technical Program</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

<div class="sffp-container" id="sffp-container">

  <div class="sffp-topbar">
    <div class="sffp-date-info" id="sffp-dateInfo">Loading...</div>
    <div class="sffp-search-icon" id="sffp-searchIcon" role="button" aria-label="Search" tabindex="0">
      <i class="fa-solid fa-magnifying-glass" aria-hidden="true"></i>
    </div>
  </div>

  <div class="sffp-search-container" id="sffp-searchContainer" style="display:none;">
    <div class="sffp-search-input-wrapper">
      <input type="text" id="sffp-searchInput" class="sffp-search-input" placeholder="Search titles, speakers, companies, keywords...">
      <button type="button" id="sffp-clearSearchBtn" class="sffp-clear-search-btn" aria-label="Clear search"><i class="fa-solid fa-xmark" aria-hidden="true"></i></button>
    </div>
    <div id="sffp-searchResultsInfo" class="sffp-search-results-info"></div>
  </div>

  <div class="sffp-view-toggle" id="sffp-viewToggle">
    <button type="button" class="sffp-view-btn active" data-view="list" id="sffp-viewListBtn">
      <i class="fa-solid fa-list" aria-hidden="true"></i> Schedule List
    </button>
    <button type="button" class="sffp-view-btn" data-view="grid" id="sffp-viewGridBtn">
      <i class="fa-solid fa-table-cells" aria-hidden="true"></i> Concurrent Grid
    </button>
  </div>

  <div class="sffp-filters">
    <div class="sffp-filter-group sffp-filter-day-group">
      <div class="sffp-filter-label">Day</div>
      <div class="sffp-filter-buttons" id="sffp-dayButtons"></div>
    </div>

    <details class="sffp-filter-dropdown">
      <summary><span>Room</span><i class="fa-solid fa-chevron-down sffp-chevron" aria-hidden="true"></i></summary>
      <div class="sffp-filter-buttons" id="sffp-roomButtons"></div>
    </details>

    <details class="sffp-filter-dropdown">
      <summary><span>Topic Area</span><i class="fa-solid fa-chevron-down sffp-chevron" aria-hidden="true"></i></summary>
      <div class="sffp-topic-filter-tree" id="sffp-topicButtons"></div>
    </details>

    <details class="sffp-filter-dropdown">
      <summary><span>Presentation Type</span><i class="fa-solid fa-chevron-down sffp-chevron" aria-hidden="true"></i></summary>
      <div class="sffp-filter-buttons" id="sffp-typeButtons"></div>
    </details>

    <details class="sffp-filter-dropdown">
      <summary><span>Color and Icon Key</span><i class="fa-solid fa-chevron-down sffp-chevron" aria-hidden="true"></i></summary>
      <div class="sffp-legend" id="sffp-legend"></div>
    </details>
  </div>

  <div class="sffp-toolbar">
    <div class="sffp-toolbar-left">
      <div class="sffp-sort-container" id="sffp-sortContainer">
        <label for="sffp-sortSelect">Sort by</label>
        <select id="sffp-sortSelect">
          <option value="time">Time</option>
          <option value="room">Room</option>
          <option value="speaker">Speaker (A–Z)</option>
          <option value="topic">Topic Area</option>
        </select>
      </div>
      <div class="sffp-grid-layout-toggle" id="sffp-gridLayoutToggle" style="display:none;">
        <span class="sffp-slider-label">Grid</span>
        <label class="sffp-toggle-slider">
          <input type="checkbox" id="sffp-gridLayoutCheckbox">
          <span class="sffp-slider"></span>
        </label>
        <span class="sffp-slider-label">Stacked List</span>
      </div>
    </div>
    <button type="button" id="sffp-resetFiltersBtn" class="sffp-reset-btn">Reset Filters</button>
  </div>

  <div class="sffp-grid-day-note" id="sffp-gridDayNote" style="display:none;"></div>

  <div class="sffp-schedule-list" id="sffp-scheduleList"></div>
  <div class="sffp-schedule-grid-wrap" id="sffp-scheduleGridWrap" style="display:none;"></div>

  <div class="sffp-no-events" id="sffp-noEvents" style="display:none;">No sessions found with the current filters.</div>
  <div class="sffp-loading" id="sffp-loading">Loading technical program...</div>
  <div class="sffp-error" id="sffp-error" style="display:none;">Error loading program data. Please try again later.</div>

</div>

<div class="sffp-sticky-hscroll" id="sffp-stickyHScroll"><div id="sffp-stickyHScrollInner"></div></div>

<div class="sffp-modal-overlay" id="sffp-modalOverlay">
  <div class="sffp-modal" id="sffp-modal" role="dialog" aria-modal="true" aria-labelledby="sffp-modalTitleHeading">
    <button type="button" class="sffp-modal-close" id="sffp-modalClose" aria-label="Close"><i class="fa-solid fa-xmark" aria-hidden="true"></i></button>
    <div id="sffp-modalContent"></div>
  </div>
</div>

<style>
  .sffp-container {
    --sffp-ink: #2a2a2a;
    --sffp-muted: #5f5f5f;
    --sffp-line: #e2ddd2;
    --sffp-paper: #fdfcfa;
    --sffp-accent: #1f5c8a;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 16px;
    line-height: 1.45;
    color: var(--sffp-ink);
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px 15px 40px;
    box-sizing: border-box;
  }
  .sffp-container *, .sffp-container *::before, .sffp-container *::after { box-sizing: border-box; }
  .sffp-container button, .sffp-container input, .sffp-container select { font-size: 16px; font-family: inherit; }

  .sffp-topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 10px; }
  .sffp-date-info { font-style: italic; color: var(--sffp-muted); font-size: 16px; }
  .sffp-search-icon { cursor: pointer; color: var(--sffp-muted); padding: 8px; border-radius: 6px; transition: background .15s, color .15s; font-size: 16px; line-height: 1; flex-shrink: 0; }
  .sffp-search-icon:hover, .sffp-search-icon:focus { background: #f0ede6; color: var(--sffp-ink); outline: none; }

  .sffp-search-container { margin-bottom: 14px; }
  .sffp-search-input-wrapper { display: flex; align-items: center; border: 1px solid var(--sffp-line); border-radius: 8px; background: var(--sffp-paper); padding: 4px 4px 4px 12px; }
  .sffp-search-input { flex: 1; border: none; outline: none; background: transparent; padding: 10px 4px; }
  .sffp-clear-search-btn { border: none; background: #f0ede6; color: var(--sffp-muted); width: 32px; height: 32px; border-radius: 50%; cursor: pointer; flex-shrink: 0; }
  .sffp-clear-search-btn:hover { background: #e2ddd2; }
  .sffp-search-results-info { color: var(--sffp-muted); margin-top: 6px; padding-left: 4px; }

  .sffp-view-toggle { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .sffp-view-btn {
    flex: 1; min-width: 160px; display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 12px 14px; border-radius: 8px; border: 1.5px solid var(--sffp-line);
    background: var(--sffp-paper); color: var(--sffp-muted); font-weight: 600;
    cursor: pointer; transition: all .15s;
  }
  .sffp-view-btn:hover { border-color: var(--sffp-accent); color: var(--sffp-ink); }
  .sffp-view-btn.active { background: var(--sffp-accent); border-color: var(--sffp-accent); color: #fff; }

  .sffp-filters { background: #f8f6f1; border: 1px solid var(--sffp-line); border-radius: 10px; padding: 14px 16px; margin-bottom: 14px; display: flex; flex-direction: column; gap: 12px; }
  .sffp-filter-group { width: 100%; }
  .sffp-filter-label { font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--sffp-muted); margin-bottom: 8px; font-size: 14px; }
  .sffp-filter-buttons { display: flex; flex-wrap: wrap; gap: 8px; }
  .sffp-filter-btn {
    padding: 8px 14px; border-radius: 20px; border: 1.5px solid var(--sffp-line); background: #fff;
    color: var(--sffp-ink); cursor: pointer; transition: all .12s; line-height: 1.3;
  }
  .sffp-filter-btn:hover { border-color: var(--sffp-accent); }
  .sffp-filter-btn.active { background: var(--sffp-accent); border-color: var(--sffp-accent); color: #fff; }
  .sffp-filter-btn.partial { border-style: dashed; border-width: 2px; }
  .sffp-filter-btn:disabled { opacity: .4; cursor: not-allowed; }

  .sffp-filter-dropdown { border: 1px solid var(--sffp-line); border-radius: 8px; background: #fff; padding: 0; }
  .sffp-filter-dropdown summary {
    list-style: none; cursor: pointer; padding: 12px 14px; display: flex; align-items: center; justify-content: space-between;
    font-weight: 700; text-transform: uppercase; letter-spacing: .05em; font-size: 14px; color: var(--sffp-muted);
  }
  .sffp-filter-dropdown summary::-webkit-details-marker { display: none; }
  .sffp-filter-dropdown summary:focus-visible { outline: 2px solid var(--sffp-accent); outline-offset: 2px; }
  .sffp-chevron { transition: transform .15s; font-size: 13px; }
  .sffp-filter-dropdown[open] summary .sffp-chevron { transform: rotate(180deg); }
  .sffp-filter-dropdown > div, .sffp-filter-dropdown > .sffp-topic-filter-tree, .sffp-filter-dropdown > .sffp-legend {
    padding: 4px 14px 14px;
  }

  .sffp-topic-filter-tree { display: flex; flex-direction: column; gap: 10px; }
  .sffp-topic-group { display: flex; flex-direction: column; gap: 6px; }
  .sffp-subtopic-buttons { display: flex; flex-wrap: wrap; gap: 6px; padding-left: 18px; border-left: 3px solid var(--sffp-line); margin-left: 4px; }
  .sffp-subtopic-btn { max-width: 260px; white-space: normal; text-align: left; background: #f8f6f1; }

  .sffp-toolbar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
  .sffp-toolbar-left { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
  .sffp-sort-container { display: flex; align-items: center; gap: 8px; color: var(--sffp-muted); }
  .sffp-sort-container select { padding: 6px 8px; border-radius: 6px; border: 1px solid var(--sffp-line); background: #fff; }
  .sffp-grid-layout-toggle { display: flex; align-items: center; gap: 8px; color: var(--sffp-muted); }
  .sffp-toggle-slider { position: relative; display: inline-block; width: 38px; height: 20px; flex-shrink: 0; }
  .sffp-toggle-slider input { opacity: 0; width: 0; height: 0; }
  .sffp-slider { position: absolute; cursor: pointer; inset: 0; background: var(--sffp-line); border-radius: 20px; transition: .2s; }
  .sffp-slider::before { content: ""; position: absolute; height: 14px; width: 14px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: .2s; }
  .sffp-toggle-slider input:checked + .sffp-slider { background: var(--sffp-accent); }
  .sffp-toggle-slider input:checked + .sffp-slider::before { transform: translateX(18px); }
  .sffp-reset-btn { padding: 8px 16px; border-radius: 7px; border: 1.5px solid var(--sffp-line); background: #fff; color: var(--sffp-muted); cursor: pointer; }
  .sffp-reset-btn:hover { border-color: #c0392b; color: #c0392b; }

  .sffp-legend { display: flex; flex-wrap: wrap; gap: 14px; }
  .sffp-legend-item { display: flex; align-items: center; gap: 7px; color: var(--sffp-muted); }
  .sffp-legend-swatch { width: 14px; height: 14px; border-radius: 3px; border: 1.5px solid; flex-shrink: 0; }
  .sffp-legend-item i { color: var(--sffp-ink); width: 16px; text-align: center; }

  .sffp-grid-day-note { color: var(--sffp-muted); background: #eef5fb; border: 1px solid #cfe3f2; padding: 10px 14px; border-radius: 7px; margin-bottom: 12px; }

  /* ---- List view ---- */
  .sffp-schedule-list { display: flex; flex-direction: column; width: 100%; }
  .sffp-day-section { margin-bottom: 26px; width: 100%; }
  .sffp-day-header {
    font-weight: 700; color: var(--sffp-ink); padding: 8px 0; margin-bottom: 12px; font-size: 18px;
    border-bottom: 2px solid var(--sffp-ink);
  }
  .sffp-day-content { display: flex; flex-direction: column; gap: 10px; width: 100%; }

  .sffp-event-card {
    border: 1.5px solid; border-radius: 9px; padding: 14px 16px; cursor: pointer; transition: box-shadow .15s, transform .1s;
    display: flex; flex-direction: column; gap: 6px; width: 100%;
  }
  .sffp-event-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .sffp-event-card:active { transform: scale(0.997); }
  .sffp-event-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .sffp-event-time { font-weight: 700; color: var(--sffp-ink); white-space: nowrap; }
  .sffp-event-title { font-weight: 600; line-height: 1.35; }
  .sffp-event-meta { color: var(--sffp-muted); display: flex; flex-wrap: wrap; gap: 6px 16px; }
  .sffp-event-meta i { width: 16px; text-align: center; }
  .sffp-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 2px; }
  .sffp-badge {
    font-weight: 700; padding: 4px 12px; border-radius: 20px; background: rgba(0,0,0,0.06); color: var(--sffp-ink);
    display: inline-flex; align-items: center; gap: 6px;
  }
  .sffp-badge-student { background: #fff2e6; color: #8a4c1f; }
  .sffp-badge-invited { background: #fff9e6; color: #8a7a1f; }

  /* ---- Grid (Room x Time) view ---- */
  .sffp-grid-scroll { overflow: auto; max-height: 65vh; border: 1px solid var(--sffp-line); border-radius: 10px; position: relative; }
  table.sffp-grid-table { border-collapse: separate; border-spacing: 0; width: 100%; min-width: 600px; }
  table.sffp-grid-table th, table.sffp-grid-table td { border-bottom: 1px solid var(--sffp-line); border-right: 1px solid var(--sffp-line); vertical-align: top; }
  table.sffp-grid-table thead th {
    position: sticky; top: 0; background: #f8f6f1; z-index: 3; padding: 12px 8px;
    font-weight: 700; color: var(--sffp-ink); text-align: center; white-space: nowrap;
  }
  table.sffp-grid-table thead th.sffp-time-col-head {
    text-align: left; background: #efeadf; z-index: 5; left: 0; position: sticky;
    box-shadow: 2px 0 4px -2px rgba(0,0,0,0.25);
  }
  table.sffp-grid-table td.sffp-time-col {
    position: sticky; left: 0; background: #f8f6f1; font-weight: 700; color: var(--sffp-muted);
    padding: 10px 8px; white-space: nowrap; z-index: 2;
    box-shadow: 2px 0 4px -2px rgba(0,0,0,0.25);
  }
  table.sffp-grid-table td.sffp-cell { padding: 5px; min-width: 160px; }
  .sffp-grid-mini-card {
    border: 1.5px solid; border-radius: 7px; padding: 8px 9px; cursor: pointer; line-height: 1.3; transition: box-shadow .15s;
    height: 100%;
  }
  .sffp-grid-mini-card:hover { box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
  .sffp-grid-mini-title { font-weight: 600; margin-bottom: 3px; }
  .sffp-grid-mini-speaker { color: var(--sffp-muted); }
  .sffp-grid-empty-cell { color: #ccc; text-align: center; padding: 10px 0; }

  /* Sticky bottom horizontal scrollbar (desktop grid) */
  .sffp-sticky-hscroll {
    position: fixed; left: 0; bottom: 0; height: 16px; overflow-x: auto; overflow-y: hidden;
    background: #f0ede6; border-top: 1px solid var(--sffp-line); z-index: 600; display: none;
  }
  .sffp-sticky-hscroll.visible { display: block; }
  #sffp-stickyHScrollInner { height: 1px; }

  /* ---- Grid stacked (mobile-friendly) alt layout ---- */
  .sffp-stacked-time-block { margin-bottom: 18px; }
  .sffp-stacked-time-header {
    font-weight: 700; color: #fff; background: var(--sffp-accent);
    padding: 7px 14px; border-radius: 6px; margin-bottom: 8px; display: inline-block;
  }
  .sffp-stacked-rooms { display: flex; flex-direction: column; gap: 8px; }
  .sffp-stacked-room-card {
    border: 1.5px solid; border-radius: 8px; padding: 12px 14px; cursor: pointer; display: flex; flex-direction: column; gap: 4px;
  }
  .sffp-stacked-room-name { font-weight: 700; text-transform: uppercase; letter-spacing: .03em; color: var(--sffp-muted); }
  .sffp-stacked-title { font-weight: 600; }
  .sffp-stacked-speaker { color: var(--sffp-muted); }

  .sffp-no-events, .sffp-loading, .sffp-error { text-align: center; padding: 40px 20px; color: var(--sffp-muted); }
  .sffp-error { color: #b02a2a; }

  /* ---- Modal ---- */
  .sffp-modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(20,18,14,0.55); z-index: 1000;
    align-items: center; justify-content: center; padding: 20px;
  }
  .sffp-modal-overlay.open { display: flex; }
  .sffp-modal {
    background: #fff; border-radius: 12px; max-width: 640px; width: 100%; max-height: 85vh; overflow-y: auto;
    padding: 28px 26px 26px; position: relative; box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 16px; line-height: 1.5; color: #2a2a2a;
  }
  .sffp-modal-close {
    position: absolute; top: 14px; right: 14px; border: none; background: #f0ede6; width: 34px; height: 34px;
    border-radius: 50%; cursor: pointer; color: #6b6b6b;
  }
  .sffp-modal-close:hover { background: #e2ddd2; }
  .sffp-modal-title { font-size: 20px; font-weight: 700; line-height: 1.35; margin: 4px 30px 12px 0; }
  .sffp-modal-badges { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .sffp-modal-meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 20px; margin-bottom: 16px; padding: 14px 16px; background: #f8f6f1; border-radius: 8px; }
  .sffp-modal-meta-label { font-weight: 700; color: #6b6b6b; text-transform: uppercase; letter-spacing: .04em; font-size: 13px; margin-bottom: 2px; }
  .sffp-modal-section { margin-bottom: 14px; }
  .sffp-modal-section-label { font-weight: 700; text-transform: uppercase; letter-spacing: .04em; color: #6b6b6b; margin-bottom: 6px; font-size: 13px; }
  .sffp-modal-body-text { color: #333; }
  .sffp-modal-poster-list { display: flex; flex-direction: column; gap: 8px; max-height: 55vh; overflow-y: auto; }
  .sffp-modal-poster-row { border: 1px solid #e2ddd2; border-radius: 7px; padding: 11px 13px; cursor: pointer; }
  .sffp-modal-poster-row:hover { background: #f8f6f1; }
  .sffp-modal-poster-row-title { font-weight: 600; }
  .sffp-modal-poster-row-speaker { color: #6b6b6b; margin-top: 3px; }
  .sffp-modal-back-link { display: inline-flex; align-items: center; gap: 6px; color: #1f5c8a; cursor: pointer; margin-bottom: 12px; font-weight: 600; }
  .sffp-modal-back-link:hover { text-decoration: underline; }

  @media (max-width: 680px) {
    .sffp-view-btn { flex-basis: 100%; }
    .sffp-toolbar { flex-direction: column; align-items: stretch; }
    .sffp-modal { padding: 22px 18px 20px; max-height: 90vh; }
    .sffp-modal-meta-grid { grid-template-columns: 1fr; }
    .sffp-topbar { flex-wrap: wrap; }
  }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {

  // ============================================================
  // CONFIG
  // Relative path — resolves correctly whether this file sits at the
  // root of a GitHub Pages repo or in a subfolder on tms.org, as long
  // as index.html and SFF2026-Program.xlsx live in the same folder.
  // ============================================================
  const DATA_URL = 'SFF2026-Program.xlsx';

  // Columns pulled from the sheet but intentionally NEVER rendered anywhere:
  // "Speaker's ID", "SesOrder", "Academic Status" — internal use only.
  // "Current as of" date comes from the Admin sheet's "Revision Date" column.

  const ROOM_ORDER = ['Room One','Room Two','Room Three','Room Four','Room Five','Room Six','Room Seven','Room Eight','Room Nine','Room Ten','Ballroom Foyer'];

  const TOPIC_COLORS = {
    'Materials':            { bg: '#ffe6e6', border: '#ffb3b3', text: '#8a2c2c' },
    'Process Development':  { bg: '#e6f4ff', border: '#b3d7ff', text: '#1f5c8a' },
    'Applications':         { bg: '#e6fff2', border: '#b3ffd6', text: '#1f7a4d' },
    'Modeling':             { bg: '#f0e6ff', border: '#d6b3ff', text: '#5a2c8a' },
    'Special Session':      { bg: '#fff2e6', border: '#ffccb3', text: '#8a4c1f' },
    'Other':                { bg: '#f5f0e8', border: '#d4c4a8', text: '#6b5a3d' }
  };

  const TYPE_LABELS = {
    'Oral': 'Oral',
    'StudentOral': 'Student Oral',
    'Poster': 'Poster',
    'StudentPoster': 'Student Poster',
    'Invited': 'Invited'
  };

  // ------------------------------------------------------------
  // DOM refs
  // ------------------------------------------------------------
  const el = id => document.getElementById(id);
  const dayButtonsEl = el('sffp-dayButtons');
  const roomButtonsEl = el('sffp-roomButtons');
  const topicButtonsEl = el('sffp-topicButtons');
  const typeButtonsEl = el('sffp-typeButtons');
  const dateInfoEl = el('sffp-dateInfo');
  const loadingEl = el('sffp-loading');
  const errorEl = el('sffp-error');
  const noEventsEl = el('sffp-noEvents');
  const scheduleListEl = el('sffp-scheduleList');
  const scheduleGridWrapEl = el('sffp-scheduleGridWrap');
  const legendEl = el('sffp-legend');
  const gridDayNoteEl = el('sffp-gridDayNote');
  const sortSelectEl = el('sffp-sortSelect');
  const sortContainerEl = el('sffp-sortContainer');
  const gridLayoutToggleEl = el('sffp-gridLayoutToggle');
  const gridLayoutCheckboxEl = el('sffp-gridLayoutCheckbox');
  const resetFiltersBtn = el('sffp-resetFiltersBtn');
  const searchIcon = el('sffp-searchIcon');
  const searchContainer = el('sffp-searchContainer');
  const searchInput = el('sffp-searchInput');
  const clearSearchBtn = el('sffp-clearSearchBtn');
  const searchResultsInfo = el('sffp-searchResultsInfo');
  const viewListBtn = el('sffp-viewListBtn');
  const viewGridBtn = el('sffp-viewGridBtn');
  const modalOverlay = el('sffp-modalOverlay');
  const modalContent = el('sffp-modalContent');
  const modalClose = el('sffp-modalClose');
  const stickyHScroll = el('sffp-stickyHScroll');
  const stickyHScrollInner = el('sffp-stickyHScrollInner');

  // ------------------------------------------------------------
  // State
  // ------------------------------------------------------------
  let events = [];       // flat list of talks/posters
  let blocks = [];       // grouped by dateKey+startMinutes+room
  let currentView = 'list';          // 'list' | 'grid'
  let gridLayoutMode = window.innerWidth <= 700 ? 'stacked' : 'grid'; // for grid view only
  let sortMode = 'time';
  let searchQuery = '';
  let isSearchActive = false;
  let topicGroups = {}; // broad topic -> array of exact topicArea strings
  let syncingScroll = false;

  const filters = {
    day: 'all',              // dateKey or 'all'
    gridDay: null,            // dateKey used specifically when currentView === 'grid'
    rooms: new Set(),         // empty = all
    topics: new Set(),        // empty = all (holds exact topicArea strings)
    types: new Set()          // empty = all
  };

  const raf = window.requestAnimationFrame ? window.requestAnimationFrame.bind(window) : (fn => setTimeout(fn, 16));

  // ------------------------------------------------------------
  // Fetch + parse
  // ------------------------------------------------------------
  fetchProgramData();

  async function fetchProgramData() {
    loadingEl.style.display = 'block';
    errorEl.style.display = 'none';
    noEventsEl.style.display = 'none';

    try {
      const response = await fetch(`${DATA_URL}?v=${Date.now()}`, {
        cache: 'no-store',
        headers: { 'Cache-Control': 'no-cache, no-store, must-revalidate', 'Pragma': 'no-cache', 'Expires': '0' }
      });
      if (!response.ok) throw new Error('Network response was not ok');

      const buf = await response.arrayBuffer();
      const workbook = XLSX.read(new Uint8Array(buf), { cellDates: true });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { defval: '' });

      events = rows.map(rowToEvent).filter(e => e.dateKey && e.room);
      buildBlocks();

      dateInfoEl.textContent = `Current as of ${readRevisionDate(workbook)}`;

      loadingEl.style.display = 'none';
      buildDayButtons();
      buildRoomButtons();
      buildTopicButtons();
      buildTypeButtons();
      buildLegend();
      setupSearch();
      render();
    } catch (err) {
      loadingEl.style.display = 'none';
      errorEl.style.display = 'block';
      console.error('Error fetching program data:', err);
    }
  }

  function readRevisionDate(workbook) {
    const adminSheet = workbook.Sheets['Admin'];
    if (adminSheet) {
      const adminRows = XLSX.utils.sheet_to_json(adminSheet, { defval: '' });
      if (adminRows.length) {
        const row = adminRows[0];
        const raw = 'Revision Date' in row ? row['Revision Date'] : Object.values(row)[0];
        if (raw instanceof Date) return raw.toLocaleDateString();
        if (raw) return String(raw);
      }
    }
    return new Date().toLocaleDateString();
  }

  function rowToEvent(row) {
    const dateVal = toDate(row['Date']);
    const startMinutes = excelTimeToMinutes(row['StartTime']);
    const duration = Number(row['Duration']) || 0;
    const topicArea = String(row['Topic Area'] || '').trim();
    return {
      dateKey: dateVal ? formatDateKey(dateVal) : '',
      dateLabel: dateVal ? formatDateLabel(dateVal) : '',
      startMinutes,
      endMinutes: startMinutes + duration,
      room: String(row['RoomName'] || '').trim(),
      topicArea,
      broadTopic: broadTopic(topicArea),
      sessionName: String(row['Session Name'] || '').trim(),
      abstractNumber: row['Abstract Number'],
      abstractType: String(row['Abstract Type'] || '').trim(),
      title: String(row['Abstract Title'] || 'Untitled').trim(),
      speakerName: String(row["Speaker's Name"] || '').trim(),
      speakerCompany: String(row["Speaker's Company"] || '').trim(),
      authors: String(row['All Authors and Affiliations'] || '').trim(),
      abstract: String(row['Abstract'] || '').trim()
    };
  }

  function buildBlocks() {
    const map = new Map();
    events.forEach(e => {
      const key = `${e.dateKey}|${e.startMinutes}|${e.room}`;
      if (!map.has(key)) {
        map.set(key, {
          key, dateKey: e.dateKey, dateLabel: e.dateLabel,
          startMinutes: e.startMinutes, endMinutes: e.endMinutes,
          room: e.room, items: []
        });
      }
      const b = map.get(key);
      b.items.push(e);
      b.endMinutes = Math.max(b.endMinutes, e.endMinutes);
    });
    blocks = Array.from(map.values());
    blocks.forEach(b => b.items.sort((a, c) => (Number(a.abstractNumber) || 0) - (Number(c.abstractNumber) || 0)));
  }

  // ------------------------------------------------------------
  // Date / time helpers
  // ------------------------------------------------------------
  function pad(n) { return n < 10 ? '0' + n : '' + n; }

  function toDate(v) {
    if (v instanceof Date) return v;
    if (typeof v === 'number') return excelSerialToDate(v);
    if (typeof v === 'string' && v) { const d = new Date(v); return isNaN(d) ? null : d; }
    return null;
  }

  function excelSerialToDate(serial) {
    const utcDays = Math.floor(serial - 25569);
    const utcMs = utcDays * 86400 * 1000;
    return new Date(utcMs);
  }

  function formatDateKey(d) { return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`; }
  function formatDateLabel(d) { return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' }); }

  function excelTimeToMinutes(v) {
    if (v instanceof Date) return v.getHours() * 60 + v.getMinutes();
    if (typeof v === 'number') return Math.round(v * 24 * 60);
    if (typeof v === 'string' && v) {
      const m = v.match(/^(\d{1,2}):(\d{2})(?::\d{2})?\s*(AM|PM)?$/i);
      if (m) {
        let h = parseInt(m[1], 10); const min = parseInt(m[2], 10); const ampm = m[3];
        if (ampm) { if (/pm/i.test(ampm) && h !== 12) h += 12; if (/am/i.test(ampm) && h === 12) h = 0; }
        return h * 60 + min;
      }
    }
    return 0;
  }

  function minutesToLabel(mins) {
    let h = Math.floor(mins / 60); const m = mins % 60;
    const ampm = h >= 12 ? 'PM' : 'AM'; let hh = h % 12; hh = hh || 12;
    return `${hh}:${pad(m)} ${ampm}`;
  }

  function broadTopic(topic) {
    if (!topic) return 'Other';
    if (topic.startsWith('Special Session')) return 'Special Session';
    if (topic.startsWith('Materials')) return 'Materials';
    if (topic.startsWith('Process Development')) return 'Process Development';
    if (topic.startsWith('Applications')) return 'Applications';
    if (topic.startsWith('Modeling')) return 'Modeling';
    return 'Other';
  }

  // Short chip label for a full topic string: strip the "Broad: " prefix and
  // any trailing parenthetical clarification, but never truncate with an
  // ellipsis — chips are allowed to wrap onto a second line instead, since
  // truncated text hidden behind a hover tooltip is a poor mobile/accessible
  // pattern.
  function subtopicLabel(fullTopic, broad) {
    let label = fullTopic;
    const prefix = broad + ':';
    if (label.startsWith(prefix)) label = label.slice(prefix.length).trim();
    const parenIdx = label.indexOf('(');
    if (parenIdx > 0) label = label.slice(0, parenIdx).trim();
    return label || fullTopic;
  }

  function roomSortIndex(room) { const i = ROOM_ORDER.indexOf(room); return i === -1 ? 999 : i; }

  function getUniqueDays() {
    const map = new Map();
    events.forEach(e => { if (!map.has(e.dateKey)) map.set(e.dateKey, e.dateLabel); });
    return Array.from(map.entries()).sort((a, b) => a[0].localeCompare(b[0])).map(([dateKey, dateLabel]) => ({ dateKey, dateLabel }));
  }

  // ------------------------------------------------------------
  // Filter builders
  // ------------------------------------------------------------
  function buildDayButtons() {
    dayButtonsEl.innerHTML = '';
    const days = getUniqueDays();

    const allBtn = document.createElement('button');
    allBtn.type = 'button';
    allBtn.className = 'sffp-filter-btn active';
    allBtn.textContent = 'All Days';
    allBtn.dataset.day = 'all';
    allBtn.addEventListener('click', () => setDayFilter('all', allBtn));
    dayButtonsEl.appendChild(allBtn);

    days.forEach(d => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'sffp-filter-btn';
      btn.textContent = d.dateLabel.split(',').slice(0, 2).join(',');
      btn.dataset.day = d.dateKey;
      btn.addEventListener('click', () => setDayFilter(d.dateKey, btn));
      dayButtonsEl.appendChild(btn);
    });

    if (days.length) filters.gridDay = days[0].dateKey;
  }

  function setDayFilter(dateKey, btn) {
    filters.day = dateKey;
    if (dateKey !== 'all') filters.gridDay = dateKey;
    dayButtonsEl.querySelectorAll('.sffp-filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  // In Grid view, "All Days" is ambiguous (which day's rooms would we show?)
  // so it's disabled and a real day is auto-selected instead.
  function enforceGridDaySelection() {
    const allBtn = dayButtonsEl.querySelector('[data-day="all"]');
    if (allBtn) allBtn.disabled = true;
    if (filters.day === 'all') {
      const days = getUniqueDays();
      if (days.length) {
        filters.day = filters.gridDay || days[0].dateKey;
        dayButtonsEl.querySelectorAll('.sffp-filter-btn').forEach(b => b.classList.toggle('active', b.dataset.day === filters.day));
      }
    }
  }

  function releaseAllDaysOption() {
    const allBtn = dayButtonsEl.querySelector('[data-day="all"]');
    if (allBtn) allBtn.disabled = false;
  }

  function buildRoomButtons() {
    roomButtonsEl.innerHTML = '';
    const rooms = Array.from(new Set(events.map(e => e.room))).sort((a, b) => roomSortIndex(a) - roomSortIndex(b));
    rooms.forEach(room => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'sffp-filter-btn';
      btn.textContent = room;
      btn.dataset.room = room;
      btn.addEventListener('click', () => {
        toggleSetMember(filters.rooms, room);
        btn.classList.toggle('active');
        render();
      });
      roomButtonsEl.appendChild(btn);
    });
  }

  function buildTopicButtons() {
    topicButtonsEl.innerHTML = '';
    topicGroups = {};
    const byBroad = {};
    Object.keys(TOPIC_COLORS).forEach(t => (byBroad[t] = new Set()));
    events.forEach(e => { if (byBroad[e.broadTopic]) byBroad[e.broadTopic].add(e.topicArea); });

    Object.keys(TOPIC_COLORS).forEach(broad => {
      const subs = Array.from(byBroad[broad]).filter(Boolean).sort();
      if (!subs.length) return;
      topicGroups[broad] = subs;
      const colors = TOPIC_COLORS[broad];

      const group = document.createElement('div');
      group.className = 'sffp-topic-group';

      const broadBtn = document.createElement('button');
      broadBtn.type = 'button';
      broadBtn.className = 'sffp-filter-btn sffp-topic-broad-btn';
      broadBtn.textContent = broad;
      broadBtn.style.borderColor = colors.border;
      broadBtn.dataset.broad = broad;
      broadBtn.addEventListener('click', () => {
        const allSelected = subs.every(s => filters.topics.has(s));
        subs.forEach(s => (allSelected ? filters.topics.delete(s) : filters.topics.add(s)));
        refreshTopicButtonStates();
        render();
      });
      group.appendChild(broadBtn);

      if (subs.length > 1) {
        const subWrap = document.createElement('div');
        subWrap.className = 'sffp-subtopic-buttons';
        subs.forEach(sub => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'sffp-filter-btn sffp-subtopic-btn';
          btn.textContent = subtopicLabel(sub, broad);
          btn.title = sub;
          btn.dataset.sub = sub;
          btn.addEventListener('click', () => {
            toggleSetMember(filters.topics, sub);
            refreshTopicButtonStates();
            render();
          });
          subWrap.appendChild(btn);
        });
        group.appendChild(subWrap);
      }

      topicButtonsEl.appendChild(group);
    });
  }

  function refreshTopicButtonStates() {
    topicButtonsEl.querySelectorAll('.sffp-subtopic-btn').forEach(b => {
      b.classList.toggle('active', filters.topics.has(b.dataset.sub));
    });
    topicButtonsEl.querySelectorAll('.sffp-topic-broad-btn').forEach(b => {
      const subs = topicGroups[b.dataset.broad] || [];
      const selected = subs.filter(s => filters.topics.has(s)).length;
      b.classList.toggle('active', selected > 0 && selected === subs.length);
      b.classList.toggle('partial', selected > 0 && selected < subs.length);
    });
  }

  function buildTypeButtons() {
    typeButtonsEl.innerHTML = '';
    const types = Array.from(new Set(events.map(e => e.abstractType))).filter(Boolean);
    types.forEach(type => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'sffp-filter-btn';
      btn.textContent = TYPE_LABELS[type] || type;
      btn.dataset.type = type;
      btn.addEventListener('click', () => {
        toggleSetMember(filters.types, type);
        btn.classList.toggle('active');
        render();
      });
      typeButtonsEl.appendChild(btn);
    });
  }

  function toggleSetMember(set, value) { set.has(value) ? set.delete(value) : set.add(value); }

  function buildLegend() {
    legendEl.innerHTML = '';
    Object.keys(TOPIC_COLORS).filter(t => events.some(e => e.broadTopic === t)).forEach(topic => {
      const c = TOPIC_COLORS[topic];
      const item = document.createElement('div');
      item.className = 'sffp-legend-item';
      item.innerHTML = `<span class="sffp-legend-swatch" style="background:${c.bg};border-color:${c.border}"></span><span>${topic}</span>`;
      legendEl.appendChild(item);
    });
    const iconNotes = [
      ['fa-graduation-cap', 'Student presentation'],
      ['fa-star', 'Invited'],
      ['fa-thumbtack', 'Poster session']
    ];
    iconNotes.forEach(([icon, label]) => {
      const item = document.createElement('div');
      item.className = 'sffp-legend-item';
      item.innerHTML = `<i class="fa-solid ${icon}" aria-hidden="true"></i><span>${label}</span>`;
      legendEl.appendChild(item);
    });
  }

  // ------------------------------------------------------------
  // Search
  // ------------------------------------------------------------
  function setupSearch() {
    searchIcon.addEventListener('click', toggleSearch);
    searchIcon.addEventListener('keydown', ev => { if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); toggleSearch(); } });
    clearSearchBtn.addEventListener('click', clearSearch);
    searchInput.addEventListener('input', () => { searchQuery = searchInput.value.trim().toLowerCase(); render(); });
  }

  function toggleSearch() {
    isSearchActive = !isSearchActive;
    searchContainer.style.display = isSearchActive ? 'block' : 'none';
    if (isSearchActive) searchInput.focus(); else clearSearch();
  }

  function clearSearch() {
    searchQuery = '';
    searchInput.value = '';
    searchResultsInfo.textContent = '';
    render();
  }

  function eventMatchesSearch(e) {
    if (!searchQuery) return true;
    const hay = [e.title, e.speakerName, e.speakerCompany, e.authors, e.abstract, e.sessionName, e.room, e.topicArea].join(' ').toLowerCase();
    return hay.includes(searchQuery);
  }

  // ------------------------------------------------------------
  // Filter matching
  // ------------------------------------------------------------
  function eventMatchesFilters(e, opts) {
    opts = opts || {};
    if (!opts.ignoreDay) {
      if (filters.day !== 'all' && e.dateKey !== filters.day) return false;
    }
    if (filters.rooms.size && !filters.rooms.has(e.room)) return false;
    if (filters.topics.size && !filters.topics.has(e.topicArea)) return false;
    if (filters.types.size && !filters.types.has(e.abstractType)) return false;
    if (!eventMatchesSearch(e)) return false;
    return true;
  }

  // ------------------------------------------------------------
  // Render dispatcher
  // ------------------------------------------------------------
  function render() {
    if (currentView === 'list') {
      scheduleListEl.style.display = 'flex';
      scheduleGridWrapEl.style.display = 'none';
      gridDayNoteEl.style.display = 'none';
      sortContainerEl.style.display = 'flex';
      gridLayoutToggleEl.style.display = 'none';
      releaseAllDaysOption();
      renderListView();
    } else {
      scheduleListEl.style.display = 'none';
      scheduleGridWrapEl.style.display = 'block';
      gridDayNoteEl.style.display = 'block';
      sortContainerEl.style.display = 'none';
      gridLayoutToggleEl.style.display = 'flex';
      enforceGridDaySelection();
      renderGridView();
    }
    updateSearchResultsInfo();
    raf(setupStickyScrollbar);
  }

  function updateSearchResultsInfo() {
    if (!isSearchActive || !searchQuery) { searchResultsInfo.textContent = ''; return; }
    const count = currentView === 'list' ? lastListCount : lastGridCount;
    searchResultsInfo.textContent = `${count} result${count === 1 ? '' : 's'} for "${searchQuery}"`;
  }

  let lastListCount = 0;
  let lastGridCount = 0;

  // ------------------------------------------------------------
  // LIST VIEW
  // ------------------------------------------------------------
  function renderListView() {
    scheduleListEl.innerHTML = '';

    const visibleBlocks = blocks.filter(b => b.items.some(e => eventMatchesFilters(e)));
    lastListCount = visibleBlocks.reduce((sum, b) => sum + b.items.filter(e => eventMatchesFilters(e)).length, 0);

    if (!visibleBlocks.length) { noEventsEl.style.display = 'block'; return; }
    noEventsEl.style.display = 'none';

    const byDay = {};
    visibleBlocks.forEach(b => { (byDay[b.dateKey] = byDay[b.dateKey] || []).push(b); });

    Object.keys(byDay).sort().forEach(dateKey => {
      const dayBlocks = sortBlocks(byDay[dateKey]);
      const section = document.createElement('div');
      section.className = 'sffp-day-section';
      const header = document.createElement('div');
      header.className = 'sffp-day-header';
      header.textContent = dayBlocks[0].dateLabel;
      section.appendChild(header);
      const content = document.createElement('div');
      content.className = 'sffp-day-content';
      dayBlocks.forEach(b => content.appendChild(createBlockCard(b)));
      section.appendChild(content);
      scheduleListEl.appendChild(section);
    });
  }

  function sortBlocks(list) {
    const repFor = b => b.items.find(e => eventMatchesFilters(e)) || b.items[0];
    const sorted = [...list];
    if (sortMode === 'time') sorted.sort((a, b) => a.startMinutes - b.startMinutes || roomSortIndex(a.room) - roomSortIndex(b.room));
    else if (sortMode === 'room') sorted.sort((a, b) => roomSortIndex(a.room) - roomSortIndex(b.room) || a.startMinutes - b.startMinutes);
    else if (sortMode === 'speaker') sorted.sort((a, b) => (repFor(a).speakerName || '').localeCompare(repFor(b).speakerName || ''));
    else if (sortMode === 'topic') sorted.sort((a, b) => repFor(a).broadTopic.localeCompare(repFor(b).broadTopic) || a.startMinutes - b.startMinutes);
    return sorted;
  }

  function createBlockCard(block) {
    const matchingItems = block.items.filter(e => eventMatchesFilters(e));
    const isMulti = block.items.length > 1;

    if (isMulti) {
      const rep = matchingItems[0] || block.items[0];
      const colors = TOPIC_COLORS[rep.broadTopic] || TOPIC_COLORS.Other;
      const card = document.createElement('div');
      card.className = 'sffp-event-card';
      card.style.background = colors.bg;
      card.style.borderColor = colors.border;
      card.innerHTML = `
        <div class="sffp-event-top">
          <div class="sffp-event-time">${minutesToLabel(block.startMinutes)} – ${minutesToLabel(block.endMinutes)}</div>
        </div>
        <div class="sffp-event-title"><i class="fa-solid fa-thumbtack" aria-hidden="true"></i> Poster Session — ${matchingItems.length} of ${block.items.length} posters</div>
        <div class="sffp-event-meta"><span><i class="fa-solid fa-location-dot" aria-hidden="true"></i> ${escapeHtml(block.room)}</span></div>
      `;
      card.addEventListener('click', () => openPosterListModal(block, matchingItems.length ? matchingItems : block.items));
      return card;
    }

    const e = matchingItems[0] || block.items[0];
    return createEventCard(e);
  }

  function createEventCard(e) {
    const colors = TOPIC_COLORS[e.broadTopic] || TOPIC_COLORS.Other;
    const card = document.createElement('div');
    card.className = 'sffp-event-card';
    card.style.background = colors.bg;
    card.style.borderColor = colors.border;
    card.innerHTML = `
      <div class="sffp-event-top">
        <div class="sffp-event-time">${minutesToLabel(e.startMinutes)} – ${minutesToLabel(e.endMinutes)}</div>
      </div>
      <div class="sffp-event-title">${escapeHtml(e.title)}</div>
      <div class="sffp-event-meta">
        <span><i class="fa-solid fa-location-dot" aria-hidden="true"></i> ${escapeHtml(e.room)}</span>
        ${e.speakerName ? `<span><i class="fa-solid fa-microphone-lines" aria-hidden="true"></i> ${escapeHtml(e.speakerName)}</span>` : ''}
      </div>
      ${typeBadgesHtml(e)}
    `;
    card.addEventListener('click', () => openEventModal(e));
    return card;
  }

  function typeBadgesHtml(e) {
    let badges = `<div class="sffp-badges">`;
    if (e.abstractType === 'StudentOral' || e.abstractType === 'StudentPoster') badges += `<span class="sffp-badge sffp-badge-student"><i class="fa-solid fa-graduation-cap" aria-hidden="true"></i> ${TYPE_LABELS[e.abstractType]}</span>`;
    else if (e.abstractType === 'Invited') badges += `<span class="sffp-badge sffp-badge-invited"><i class="fa-solid fa-star" aria-hidden="true"></i> Invited</span>`;
    else if (e.abstractType) badges += `<span class="sffp-badge">${TYPE_LABELS[e.abstractType] || e.abstractType}</span>`;
    badges += `<span class="sffp-badge">${escapeHtml(e.broadTopic)}</span>`;
    badges += `</div>`;
    return badges;
  }

  // ------------------------------------------------------------
  // GRID VIEW (Room x Time — concurrent sessions)
  // ------------------------------------------------------------
  function renderGridView() {
    scheduleGridWrapEl.innerHTML = '';

    const dayKey = filters.day !== 'all' ? filters.day : filters.gridDay;
    const days = getUniqueDays();
    const activeDay = days.find(d => d.dateKey === dayKey) || days[0];
    if (!activeDay) { noEventsEl.style.display = 'block'; return; }

    gridDayNoteEl.textContent = `Showing concurrent sessions for ${activeDay.dateLabel}. Use the Day filter above to switch days — every room's session at the same time slot is a concurrent option.`;

    let dayBlocks = blocks.filter(b => b.dateKey === activeDay.dateKey);
    dayBlocks = dayBlocks.filter(b => b.items.some(e => eventMatchesFilters(e, { ignoreDay: true })));

    lastGridCount = dayBlocks.reduce((sum, b) => sum + b.items.filter(e => eventMatchesFilters(e, { ignoreDay: true })).length, 0);

    if (!dayBlocks.length) { noEventsEl.style.display = 'block'; return; }
    noEventsEl.style.display = 'none';

    let rooms = Array.from(new Set(dayBlocks.map(b => b.room))).sort((a, b) => roomSortIndex(a) - roomSortIndex(b));
    const times = Array.from(new Set(dayBlocks.map(b => b.startMinutes))).sort((a, b) => a - b);

    const blockMap = new Map();
    dayBlocks.forEach(b => blockMap.set(`${b.startMinutes}|${b.room}`, b));

    if (gridLayoutMode === 'grid') {
      renderGridTable(rooms, times, blockMap);
    } else {
      renderGridStacked(rooms, times, blockMap);
    }
  }

  function renderGridTable(rooms, times, blockMap) {
    const wrap = document.createElement('div');
    wrap.className = 'sffp-grid-scroll';
    const table = document.createElement('table');
    table.className = 'sffp-grid-table';

    const thead = document.createElement('thead');
    const headRow = document.createElement('tr');
    headRow.innerHTML = `<th class="sffp-time-col-head">Time</th>` + rooms.map(r => `<th>${escapeHtml(r)}</th>`).join('');
    thead.appendChild(headRow);
    table.appendChild(thead);

    const tbody = document.createElement('tbody');
    times.forEach(t => {
      const tr = document.createElement('tr');
      const timeTd = document.createElement('td');
      timeTd.className = 'sffp-time-col';
      timeTd.textContent = minutesToLabel(t);
      tr.appendChild(timeTd);

      rooms.forEach(room => {
        const td = document.createElement('td');
        td.className = 'sffp-cell';
        const block = blockMap.get(`${t}|${room}`);
        if (block) {
          td.appendChild(buildMiniCard(block));
        } else {
          td.innerHTML = `<div class="sffp-grid-empty-cell">—</div>`;
        }
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    wrap.appendChild(table);
    scheduleGridWrapEl.appendChild(wrap);

    attachGridScrollSync(wrap);
  }

  function buildMiniCard(block) {
    const matchingItems = block.items.filter(e => eventMatchesFilters(e, { ignoreDay: true }));
    const isMulti = block.items.length > 1;
    const rep = matchingItems[0] || block.items[0];
    const colors = TOPIC_COLORS[rep.broadTopic] || TOPIC_COLORS.Other;
    const card = document.createElement('div');
    card.className = 'sffp-grid-mini-card';
    card.style.background = colors.bg;
    card.style.borderColor = colors.border;
    if (isMulti) {
      card.innerHTML = `<div class="sffp-grid-mini-title"><i class="fa-solid fa-thumbtack" aria-hidden="true"></i> Poster Session</div><div class="sffp-grid-mini-speaker">${matchingItems.length} of ${block.items.length} posters</div>`;
      card.addEventListener('click', () => openPosterListModal(block, matchingItems.length ? matchingItems : block.items));
    } else {
      const e = rep;
      card.innerHTML = `<div class="sffp-grid-mini-title">${escapeHtml(e.title)}</div><div class="sffp-grid-mini-speaker">${escapeHtml(e.speakerName || '')}</div>`;
      card.addEventListener('click', () => openEventModal(e));
    }
    return card;
  }

  function renderGridStacked(rooms, times, blockMap) {
    const container = document.createElement('div');
    times.forEach(t => {
      const activeRooms = rooms.filter(r => blockMap.has(`${t}|${r}`));
      if (!activeRooms.length) return;
      const section = document.createElement('div');
      section.className = 'sffp-stacked-time-block';
      section.innerHTML = `<div class="sffp-stacked-time-header">${minutesToLabel(t)}</div>`;
      const roomsWrap = document.createElement('div');
      roomsWrap.className = 'sffp-stacked-rooms';
      activeRooms.forEach(room => {
        const block = blockMap.get(`${t}|${room}`);
        const matchingItems = block.items.filter(e => eventMatchesFilters(e, { ignoreDay: true }));
        const isMulti = block.items.length > 1;
        const rep = matchingItems[0] || block.items[0];
        const colors = TOPIC_COLORS[rep.broadTopic] || TOPIC_COLORS.Other;
        const card = document.createElement('div');
        card.className = 'sffp-stacked-room-card';
        card.style.background = colors.bg;
        card.style.borderColor = colors.border;
        if (isMulti) {
          card.innerHTML = `<div class="sffp-stacked-room-name">${escapeHtml(room)}</div><div class="sffp-stacked-title"><i class="fa-solid fa-thumbtack" aria-hidden="true"></i> Poster Session</div><div class="sffp-stacked-speaker">${matchingItems.length} of ${block.items.length} posters</div>`;
          card.addEventListener('click', () => openPosterListModal(block, matchingItems.length ? matchingItems : block.items));
        } else {
          const e = rep;
          card.innerHTML = `<div class="sffp-stacked-room-name">${escapeHtml(room)}</div><div class="sffp-stacked-title">${escapeHtml(e.title)}</div><div class="sffp-stacked-speaker">${escapeHtml(e.speakerName || '')}</div>`;
          card.addEventListener('click', () => openEventModal(e));
        }
        roomsWrap.appendChild(card);
      });
      section.appendChild(roomsWrap);
      container.appendChild(section);
    });
    scheduleGridWrapEl.appendChild(container);
  }

  // ------------------------------------------------------------
  // Sticky bottom horizontal scrollbar (desktop Grid view)
  // ------------------------------------------------------------
  function attachGridScrollSync(gridScrollEl) {
    gridScrollEl.addEventListener('scroll', () => {
      if (syncingScroll) return;
      syncingScroll = true;
      stickyHScroll.scrollLeft = gridScrollEl.scrollLeft;
      syncingScroll = false;
    });
  }

  stickyHScroll.addEventListener('scroll', () => {
    if (syncingScroll) return;
    const gridScrollEl = scheduleGridWrapEl.querySelector('.sffp-grid-scroll');
    if (!gridScrollEl) return;
    syncingScroll = true;
    gridScrollEl.scrollLeft = stickyHScroll.scrollLeft;
    syncingScroll = false;
  });

  function setupStickyScrollbar() {
    const gridScrollEl = scheduleGridWrapEl.querySelector('.sffp-grid-scroll');
    if (!gridScrollEl || currentView !== 'grid' || gridLayoutMode !== 'grid') {
      stickyHScroll.classList.remove('visible');
      return;
    }
    const needsScroll = gridScrollEl.scrollWidth > gridScrollEl.clientWidth + 2;
    if (!needsScroll) { stickyHScroll.classList.remove('visible'); return; }

    const rect = gridScrollEl.getBoundingClientRect();
    const viewportHeight = window.innerHeight;
    const gridInViewport = rect.bottom > 0 && rect.top < viewportHeight;
    // Hide the shadow scrollbar once the real one (bottom edge of the grid) is
    // already visible on screen — no need to duplicate it there.
    const realOneVisible = rect.bottom <= viewportHeight;

    if (!gridInViewport || realOneVisible) {
      stickyHScroll.classList.remove('visible');
      return;
    }

    stickyHScroll.classList.add('visible');
    stickyHScroll.style.left = rect.left + 'px';
    stickyHScroll.style.width = rect.width + 'px';
    stickyHScrollInner.style.width = gridScrollEl.scrollWidth + 'px';
    if (!syncingScroll) stickyHScroll.scrollLeft = gridScrollEl.scrollLeft;
  }

  window.addEventListener('scroll', setupStickyScrollbar, { passive: true });
  window.addEventListener('resize', setupStickyScrollbar);

  // ------------------------------------------------------------
  // Modal
  // ------------------------------------------------------------
  function escapeHtml(str) {
    return String(str || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  function openEventModal(e) {
    modalContent.innerHTML = `
      <div class="sffp-modal-title" id="sffp-modalTitleHeading">${escapeHtml(e.title)}</div>
      ${typeBadgesHtml(e).replace('sffp-badges', 'sffp-badges sffp-modal-badges')}
      <div class="sffp-modal-meta-grid">
        <div><div class="sffp-modal-meta-label">Day</div><div>${escapeHtml(e.dateLabel)}</div></div>
        <div><div class="sffp-modal-meta-label">Time</div><div>${minutesToLabel(e.startMinutes)} – ${minutesToLabel(e.endMinutes)}</div></div>
        <div><div class="sffp-modal-meta-label">Room</div><div>${escapeHtml(e.room)}</div></div>
        <div><div class="sffp-modal-meta-label">Session</div><div>${escapeHtml(e.sessionName || '—')}</div></div>
        <div><div class="sffp-modal-meta-label">Topic Area</div><div>${escapeHtml(e.topicArea || '—')}</div></div>
      </div>
      ${e.speakerName ? `<div class="sffp-modal-section"><div class="sffp-modal-section-label">Speaker</div><div class="sffp-modal-body-text">${escapeHtml(e.speakerName)}${e.speakerCompany ? ', ' + escapeHtml(e.speakerCompany) : ''}</div></div>` : ''}
      ${e.authors ? `<div class="sffp-modal-section"><div class="sffp-modal-section-label">All Authors &amp; Affiliations</div><div class="sffp-modal-body-text">${escapeHtml(e.authors)}</div></div>` : ''}
      ${e.abstract ? `<div class="sffp-modal-section"><div class="sffp-modal-section-label">Abstract</div><div class="sffp-modal-body-text">${escapeHtml(e.abstract).replace(/\n/g, '<br>')}</div></div>` : ''}
    `;
    openModal();
  }

  function openPosterListModal(block, items) {
    const rows = items.map((e, i) => `
      <div class="sffp-modal-poster-row" data-idx="${i}">
        <div class="sffp-modal-poster-row-title">${escapeHtml(e.title)}</div>
        <div class="sffp-modal-poster-row-speaker">${escapeHtml(e.speakerName || '')}${e.speakerCompany ? ', ' + escapeHtml(e.speakerCompany) : ''}</div>
      </div>`).join('');
    modalContent.innerHTML = `
      <div class="sffp-modal-title" id="sffp-modalTitleHeading"><i class="fa-solid fa-thumbtack" aria-hidden="true"></i> Poster Session — ${items.length} Posters</div>
      <div class="sffp-modal-meta-grid">
        <div><div class="sffp-modal-meta-label">Day</div><div>${escapeHtml(block.dateLabel)}</div></div>
        <div><div class="sffp-modal-meta-label">Time</div><div>${minutesToLabel(block.startMinutes)} – ${minutesToLabel(block.endMinutes)}</div></div>
        <div><div class="sffp-modal-meta-label">Room</div><div>${escapeHtml(block.room)}</div></div>
      </div>
      <div class="sffp-modal-poster-list">${rows}</div>
    `;
    modalContent.querySelectorAll('.sffp-modal-poster-row').forEach(row => {
      row.addEventListener('click', () => {
        const idx = Number(row.dataset.idx);
        openEventModal(items[idx]);
        const back = document.createElement('div');
        back.className = 'sffp-modal-back-link';
        back.innerHTML = `<i class="fa-solid fa-arrow-left" aria-hidden="true"></i> Back to poster list`;
        back.addEventListener('click', () => openPosterListModal(block, items));
        modalContent.prepend(back);
      });
    });
    openModal();
  }

  function openModal() { modalOverlay.classList.add('open'); }
  function closeModal() { modalOverlay.classList.remove('open'); modalContent.innerHTML = ''; }

  modalClose.addEventListener('click', closeModal);
  modalOverlay.addEventListener('click', ev => { if (ev.target === modalOverlay) closeModal(); });
  document.addEventListener('keydown', ev => { if (ev.key === 'Escape') closeModal(); });

  // ------------------------------------------------------------
  // Top-level controls
  // ------------------------------------------------------------
  viewListBtn.addEventListener('click', () => {
    currentView = 'list';
    viewListBtn.classList.add('active');
    viewGridBtn.classList.remove('active');
    render();
  });
  viewGridBtn.addEventListener('click', () => {
    currentView = 'grid';
    viewGridBtn.classList.add('active');
    viewListBtn.classList.remove('active');
    render();
  });

  sortSelectEl.addEventListener('change', () => { sortMode = sortSelectEl.value; render(); });

  gridLayoutCheckboxEl.checked = gridLayoutMode === 'stacked';
  gridLayoutCheckboxEl.addEventListener('change', () => {
    gridLayoutMode = gridLayoutCheckboxEl.checked ? 'stacked' : 'grid';
    render();
  });

  resetFiltersBtn.addEventListener('click', () => {
    filters.day = currentView === 'grid' ? filters.gridDay : 'all';
    filters.rooms.clear();
    filters.topics.clear();
    filters.types.clear();
    searchQuery = '';
    searchInput.value = '';
    clearSearch();
    dayButtonsEl.querySelectorAll('.sffp-filter-btn').forEach(b => b.classList.toggle('active', b.dataset.day === filters.day));
    roomButtonsEl.querySelectorAll('.sffp-filter-btn').forEach(b => b.classList.remove('active'));
    refreshTopicButtonStates();
    typeButtonsEl.querySelectorAll('.sffp-filter-btn').forEach(b => b.classList.remove('active'));
    render();
  });

});
</script>

</body>
</html>
